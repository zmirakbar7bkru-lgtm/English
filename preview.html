<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            background-color: #f0f4f8;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        section {
            padding: 20px;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: #1c5980;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My First Website</h1>
</header>

<section>
    <p>I built this website myself using GitHub Pages.</p>

    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <p>
        <a href="https://github.com" target="_blank">
            Visit GitHub
        </a>
    </p>
</section>

</body>
</html>
